name: JavaWebApp CI/CD Workflow

on:
  workflow_dispatch:


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    - name: Print Java Version
      run: java -version
    - name: Print Maven Version
      run: mvn --version    
    - name: Maven Clean Package
      run:  mvn clean package